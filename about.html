<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ABOUT US | THE SQUAD</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            background: radial-gradient(circle at center, #420000 0%, #290000 60%, #150000 100%);
            color: #fff; 
            min-height: 100vh; 
            font-family: 'Poppins', sans-serif;
            position: relative;
            padding-bottom: 100px;
        }

        /* Navigasi */
        nav { 
            position: fixed; top: 40px; left: 50%; transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.04); 
            backdrop-filter: blur(20px);
            padding: 12px 50px; 
            border-radius: 100px; 
            display: flex; align-items: center; 
            gap: 80px; 
            border: 1px solid rgba(255,255,255,0.1);
            z-index: 1000;
            width: auto;
            white-space: nowrap;
        }

        .school-logo img { height: 32px; opacity: 0.9; }
        .nav-links { display: flex; gap: 40px; }
        .nav-links a { 
            text-decoration: none; color: rgba(255,255,255,0.6); 
            font-weight: 400; font-size: 0.75rem; 
            text-transform: uppercase; letter-spacing: 3px;
            transition: 0.5s;
        }
        .nav-links a:hover, .nav-links a.active { color: #d4b996; transform: translateY(-5px); display: inline-block; }

        /* CONTAINER */
        .container { max-width: 1300px; margin: 0 auto; padding-top: 180px; text-align: center; }
        
        .section-title h1 { 
            font-family: 'Playfair Display', serif;
            font-size: 4.5rem; font-weight: 900; margin-bottom: 70px;
            color: #fff;
            letter-spacing: -1px;
        }

        /* GRID ANGGOTA */
        .team-container {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 35px;
            padding: 0 20px;
        }

        .member-profile {
            width: 220px;
            transition: 0.5s ease;
        }

        /* FRAME FOTO */
        .photo-wrapper {
            width: 100%;
            height: 310px;
            background: #300000; 
            border-radius: 110px 110px 15px 15px;
            overflow: hidden;
            border: 1px solid rgba(212, 185, 150, 0.25);
            margin-bottom: 20px;
            position: relative;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
        }

        .photo-wrapper img {
            width: 100%; height: 100%; object-fit: cover;
            transition: 0.8s ease;
        }

        .member-profile:hover img { transform: scale(1.1); }

        /* INFO TEKS */
        .member-info h3 { 
            font-family: 'Playfair Display', serif; 
            font-size: 1.3rem; 
            color: #fff; 
            margin-bottom: 5px; 
        }

        /* SIMBOL DI BAWAH */
        .footer-symbol { 
            margin-top: 100px; 
            font-size: 1.2rem; 
            letter-spacing: 15px; 
            color: #d4b996; 
            opacity: 0.6; 
        }

        /* --- TAMBAHAN KHUSUS MOBILE (HP) --- */
        @media (max-width: 768px) {
            nav {
                width: 95%;
                padding: 10px 20px;
                gap: 20px;
                top: 20px;
            }
            .nav-links { gap: 15px; }
            .nav-links a { font-size: 0.55rem; letter-spacing: 1px; }
            .school-logo img { height: 20px; }

            .container { padding-top: 130px; }
            
            .section-title h1 { 
                font-size: 2.5rem; 
                margin-bottom: 40px; 
            }

            .team-container {
                gap: 25px;
            }

            .member-profile {
                width: 45%; /* Menampilkan 2 foto per baris di HP */
            }

            .photo-wrapper {
                height: 220px; /* Sesuaikan tinggi frame agar proposional di HP */
                border-radius: 80px 80px 15px 15px;
            }

            .member-info h3 {
                font-size: 1rem;
            }

            .footer-symbol {
                margin-top: 50px;
            }
        }

        @media (max-width: 480px) {
            .member-profile {
                width: 80%; /* Menampilkan 1 foto besar per baris di HP yang sangat kecil */
            }
        }

    </style>
</head>
<body>

    <nav>
        <div class="school-logo">
            <img src="image/logo.png" alt="LOGO">
        </div>
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="about.html" class="active">About</a>
            <a href="project.html">Projects</a>
        </div>
    </nav>

    <div class="container">
        <div class="section-title">
            <h1>The Creative Minds.</h1>
        </div>

        <div class="team-container">
            <div class="member-profile">
                <div class="photo-wrapper">
                    <img src="image/bagus.jpeg" alt="Bagus">
                </div>
                <div class="member-info">
                    <h3>Bagus</h3>
                </div>
            </div>

            <div class="member-profile">
                <div class="photo-wrapper">
                    <img src="image/juwita.jpeg" alt="Juwita">
                </div>
                <div class="member-info">
                    <h3>Juwita</h3>
                </div>
            </div>

            <div class="member-profile">
                <div class="photo-wrapper">
                    <img src="image/joe.jpeg" alt="Joe">
                </div>
                <div class="member-info">
                    <h3>Joe</h3>
                </div>
            </div>

            <div class="member-profile">
                <div class="photo-wrapper">
                    <img src="image/kevin.jpeg" alt="Kevin">
                </div>
                <div class="member-info">
                    <h3>Kevin</h3>
                </div>
            </div>

            <div class="member-profile">
                <div class="photo-wrapper">
                    <img src="image/ruth.jpeg" alt="Ruth">
                </div>
                <div class="member-info">
                    <h3>Ruth</h3>
                </div>
            </div>
        </div>

        <div class="footer-symbol">✧ ✦ ✧</div>
    </div>

</body>
</html>
